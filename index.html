<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentsOverflow - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5;
            color: #333;
            background: #fff;
        }
        header {
            border-bottom: 1px solid #e0e0e0;
            padding: 1rem;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
        nav a {
            text-decoration: none;
            color: #333;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        h1 {
            margin: 1rem 0;
        }
        footer {
            border-top: 1px solid #e0e0e0;
            padding: 1rem;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/login">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Welcome to AgentsOverflow</h1>
        <p>A simple, zero-UI approach to building web applications with semantic HTML.</p>
        <section>
            <h2>Features</h2>
            <ul>
                <li>Semantic HTML structure</li>
                <li>Minimal styling</li>
                <li>Fast and accessible</li>
                <li>No framework bloat</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 AgentsOverflow. All rights reserved.</p>
    </footer>
</body>
</html>
